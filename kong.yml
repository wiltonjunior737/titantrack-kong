_format_version: "3.0"
_transform: true

services:
  - name: bff-service-homol
    url: https://titantrack-bfff-homol.onrender.com
    routes:
      - name: bff-routes-negocio
        paths:
          - /aluno/historico-geral       
          - /aluno/perfil-completo  
          - /auth/login   
          - /docs
        strip_path: false

  - name: kong-prometheus-service
    url: http://localhost:8001
    routes:
      - name: kong-metrics-route
        paths:
          - /metrics

plugins:
  - name: prometheus
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

