_format_version: "3.0"
_transform: true

services:
  - name: bff-service-dev
    url: https://titantrack-bfff-dev.onrender.com
    routes:
      - name: bff-routes-negocio-dev
        paths:
          - /api/auth       
          - /api/aluno      
          - /api/metrics    
          - /api/docs

plugins:
  - name: prometheus
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

