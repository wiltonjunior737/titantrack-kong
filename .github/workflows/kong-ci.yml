name: Kong CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar sintaxe do Kong YAML
        run: |
          docker run --rm -e KONG_DATABASE=off -v "$(pwd):/workspace" kong:latest kong config parse /workspace/kong.yml

      - name: Logar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: guilhermewoloszyn
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            guilhermewoloszyn/titantrack-kong:latest
            guilhermewoloszyn/titantrack-kong:${{ github.sha }}

      - name: Deploy para DEV no Render
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"

      - name: Deploy para HOMOL no Render
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_HOMOL }}"